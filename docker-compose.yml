version: '3.9'

services:

  backend:
    build: ./backend
    ports:
      - "8080:8080"

    environment:
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_REGION: ${AWS_REGION}

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

    depends_on:
      - backend