plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-web'

	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'

	implementation 'software.amazon.awssdk:ec2:2.25.53'
	implementation 'software.amazon.awssdk:s3:2.25.53'
	implementation 'software.amazon.awssdk:iam:2.25.53'
	implementation 'software.amazon.awssdk:cloudtrail:2.25.53'
	implementation 'software.amazon.awssdk:dynamodb:2.25.53'

	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.5.0'

	testCompileOnly 'org.projectlombok:lombok'
	testAnnotationProcessor 'org.projectlombok:lombok'

	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}
